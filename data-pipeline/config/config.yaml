databricks:
  host: "https://${DATABRICKS_HOST}"
  catalog: 'food_sales_forecast'
  cluster-id: "${DATABRICKS_CLUSTER_ID}"
  app-name: 'training_dataset_cleaning'

monitoring:
  observability:
    service_name: food-sales-predictor
    environment: dev
    components:
      dags: airflow
      data_pipeline: data-pipeline
      feature_transformation: feature_transformation
      ml_model: model_training
    otlp:
      endpoint: "${OTEL_EXPORTER_OTLP_ENDPOINT}"
      headers: "${OTEL_EXPORTER_OTLP_HEADERS}"
      protocol: http/protobuf
    sampling_ratio: 0.1

schemas:
  base: 'store-schema'
  processed: 'store-data-processing-schema'
  forecast: 'sale-prediction'

transformed_target_table: 'transformed_training_data'

training_data_location:
  dataset: '/Volumes/food_sales_forecast/store-schema/store_training_dataset_raw/production_planning_dataset.csv'

target: 'sales_unit_qty'
group_ids:
  - 'store_id'
  - 'Item Slin'

Features:
  numerical:
    # Transaction-level
    - 'Gross_sales'
    - 'avg_sell_price'
    # Promotion
    - 'promo_quantity'
    - 'promo_amount'
    # Production planning
    - 'PRODUCTION_QUANTITY'
    - 'HOLD_TIME'
    - 'MIN_PRES'
    - 'MAX_PRES'
    - 'ALERT_LOOK_AHEAD_MIN'
    - 'QUANTITY_LOOK_AHEAD_MIN'
    - 'OPENING_PRES_FIXED'         # FIX: was missing — needed for double cast before scaling
    - 'OPENING_PRES_PREDICTIVE'
    - 'PRODUCTION_MULTIPLIER'
    - 'FORECAST_WEIGHT_PERCENTAGE' # FIX: was missing — needed for double cast before scaling
    # Location
    - 'Latitude'
    - 'Longitude'
    # Store operations
    - 'Store_Hours_Per_Day'
    - 'Retail_Minimum_Hours'
    - 'Restaurant_Minimum_Hours'
    # NOTE: PERISHABLE, snap_CA/TX/WI deliberately excluded here.
    # They are binary flags (0/1) handled by binary_encoding; casting them
    # as continuous doubles and then standard-scaling would destroy their semantics.

  date_time:
    - 'transaction_timestamp'
    - 'day_date'
  date_time_features:
    transaction_timestamp:
      extract:
        - 'hour'        # → transaction_timestamp_hour_sin / _cos
        - 'dayofweek'   # → transaction_timestamp_dayofweek_sin / _cos
        - 'month'       # → transaction_timestamp_month_sin / _cos
        - 'quarter'     # → transaction_timestamp_quarter  (raw int — not cyclical)
        - 'year'        # → transaction_timestamp_year     (raw int — not cyclical)
        - 'weekofyear'  # → transaction_timestamp_weekofyear_sin / _cos
    day_date:
      extract:
        - 'dayofweek'   # → day_date_dayofweek_sin / _cos
        - 'month'       # → day_date_month_sin / _cos
        - 'dayofmonth'  # → day_date_dayofmonth_sin / _cos
        - 'is_weekend'  # → day_date_is_weekend  (binary flag — kept as raw 0/1)

  # ── Binary (Y/N → 1/0) ──────────────────────────────────────────────────
  binary:
    - 'PERISHABLE'
    - 'Flag_Delivery'
    - 'self_checkout'
    - 'Mobile_Checkout'
    - 'Metro'
    - 'Corner'
    - 'snap_CA'
    - 'snap_TX'
    - 'snap_WI'
    - 'Rest_Ops'
    - 'Daylight_Saving_Indicator'
    - 'product_active_flag'

  tft_covariates:
    static_categoricals:
      - 'store_id'
      - 'Item Slin'
      - 'ITEM_NAME'
      - 'ITEM_UNIT'
      - 'HOLD_TIME_UNIT'
      - 'Flow'
      - 'cat_id'
      - 'dept_id'
      - 'state_id'
      - 'City'
      - 'County'
      - 'DMA_Name'
      - 'zone_code'
      - 'franchise_code'
      - 'Hierarchy_Level'
      - 'PRODUCTION_PERIOD_GROUP_ID'
      - 'owner_code'
      - 'DMA_Code'
      - 'Time_Zone_Code'
      - 'postal_code'
      - 'market_code'
      - 'Super_Market'
      - 'zone_name'
      - 'store_ops_code'
      - 'total_zone_code'
      - 'super_zone'
      - 'Operating_System'
      - 'POS_Type'
      - 'Flag_Delivery'
      - 'self_checkout'
      - 'Mobile_Checkout'
      - 'Metro'
      - 'Corner'
      - 'PREDICTIVE_MODEL'
      - 'ROUNDING'
      - 'ORGANIZATION_ID'
      - 'country_ops_code'
      - 'country_ops_description'
      - 'Rest_Ops'
      - 'Daylight_Saving_Indicator'
      - 'Operator_Changeover_Date'
      - 'Store_Operating_Hours_Mon'
      - 'Store_Operating_Hours_Tue'
      - 'Store_Operating_Hours_Wed'
      - 'Store_Operating_Hours_Thu'
      - 'Store_Operating_Hours_Fri'
      - 'Store_Operating_Hours_Sat'
      - 'Store_Operating_Hours_Sun'
    static_reals:
      - 'PRODUCTION_QUANTITY'
      - 'HOLD_TIME'
      - 'MIN_PRES'
      - 'MAX_PRES'
      - 'ALERT_LOOK_AHEAD_MIN'
      - 'QUANTITY_LOOK_AHEAD_MIN'
      - 'PRODUCTION_MULTIPLIER'
      - 'Latitude'
      - 'Longitude'
      - 'PERISHABLE'
      - 'FORECAST_WEIGHT_PERCENTAGE'
      - 'OPENING_PRES_PREDICTIVE'
      - 'OPENING_PRES_FIXED'
      - 'Store_Hours_Per_Day'
      - 'Retail_Minimum_Hours'
      - 'Restaurant_Minimum_Hours'
    time_varying_known_categoricals:
      - 'DAYPART_NAME'
      - 'PERIOD_NAME'
      - 'PRODUCTION_PERIOD_GROUP_NAME'
      - 'DAYPART_DAYS'
      - 'product_active_flag'
      - 'eff_reg_start_date'
      - 'eff_reg_end_date'
      - 'LastChgDTM'
      - 'weekday'
      - 'Holidays'
      - 'event_name_1'
      - 'event_type_1'
      - 'event_name_2'
      - 'event_type_2'
      - 'promotion_id'
    time_varying_known_reals:
      # Cyclical datetime features (sin/cos pairs replace raw integers)
      - 'transaction_timestamp_hour_sin'
      - 'transaction_timestamp_hour_cos'
      - 'transaction_timestamp_dayofweek_sin'
      - 'transaction_timestamp_dayofweek_cos'
      - 'transaction_timestamp_month_sin'
      - 'transaction_timestamp_month_cos'
      - 'transaction_timestamp_weekofyear_sin'
      - 'transaction_timestamp_weekofyear_cos'
      - 'transaction_timestamp_quarter'   # raw int — ordinal, not cyclical
      - 'transaction_timestamp_year'      # raw int — ordinal, not cyclical
      - 'day_date_dayofweek_sin'
      - 'day_date_dayofweek_cos'
      - 'day_date_month_sin'
      - 'day_date_month_cos'
      - 'day_date_dayofmonth_sin'
      - 'day_date_dayofmonth_cos'
      - 'day_date_is_weekend'             # binary flag — kept as raw 0/1
      # Binary flags
      - 'snap_CA'
      - 'snap_TX'
      - 'snap_WI'
      # Financial known-ahead
      - 'promo_amount'
    time_varying_unknown_categoricals: []
    time_varying_unknown_reals:
      - 'sales_unit_qty'   # TARGET — only known historically
      - 'Gross_sales'
      - 'avg_sell_price'
      - 'promo_quantity'

    transformations:
      target_scaling:
        method: 'log1p'      # log(1+x) applied first, then z-scored with numerical_scaling
        column: 'sales_unit_qty'
      numerical_scaling:
        method: 'standard'
        columns:
          - 'Gross_sales'
          - 'avg_sell_price'
          - 'promo_quantity'
          - 'promo_amount'
          - 'PRODUCTION_QUANTITY'
          - 'HOLD_TIME'
          - 'MIN_PRES'
          - 'MAX_PRES'
          - 'ALERT_LOOK_AHEAD_MIN'
          - 'QUANTITY_LOOK_AHEAD_MIN'
          - 'Latitude'
          - 'Longitude'
          - 'Store_Hours_Per_Day'
          - 'OPENING_PRES_PREDICTIVE'
          - 'OPENING_PRES_FIXED'
          - 'Retail_Minimum_Hours'
          - 'Restaurant_Minimum_Hours'
          - 'FORECAST_WEIGHT_PERCENTAGE'
          - 'PRODUCTION_MULTIPLIER'
          # sales_unit_qty added dynamically by scale_features() after log1p

  categorical_encoding:
    method: 'label'
    columns:
      - 'ITEM_NAME'
      - 'Item Slin'
      - 'ITEM_UNIT'
      - 'store_id'
      - 'state_id'
      - 'City'
      - 'County'
      - 'DAYPART_NAME'
      - 'weekday'
      - 'Holidays'
      - 'event_name_1'
      - 'event_type_1'
      - 'event_name_2'
      - 'event_type_2'
      - 'promotion_id'
      - 'DMA_Name'
      - 'zone_code'
      - 'cat_id'
      - 'dept_id'
      - 'Flow'
      - 'HOLD_TIME_UNIT'
      - 'PERIOD_NAME'
      - 'PRODUCTION_PERIOD_GROUP_NAME'
      - 'PRODUCTION_PERIOD_GROUP_ID'
      - 'Operating_System'
      - 'POS_Type'
      - 'PREDICTIVE_MODEL'
      - 'ROUNDING'
      - 'DAYPART_DAYS'
      - 'eff_reg_start_date'
      - 'eff_reg_end_date'
      - 'ORGANIZATION_ID'
      - 'country_ops_code'
      - 'country_ops_description'
      - 'Operator_Changeover_Date'
      - 'LastChgDTM'
      - 'franchise_code'
      - 'Hierarchy_Level'
      - 'owner_code'
      - 'DMA_Code'
      - 'Time_Zone_Code'
      - 'postal_code'
      - 'market_code'
      - 'Super_Market'
      # zone_name removed — listed in drop_columns, won't exist at encode time
      - 'super_zone'
      - 'store_ops_code'
      - 'total_zone_code'
      - 'Store_Operating_Hours_Mon'
      - 'Store_Operating_Hours_Tue'
      - 'Store_Operating_Hours_Wed'
      - 'Store_Operating_Hours_Thu'
      - 'Store_Operating_Hours_Fri'
      - 'Store_Operating_Hours_Sat'
      - 'Store_Operating_Hours_Sun'
    binary_encoding:
      map: { 'Y': 1, 'N': 0 }
      columns:
        - 'Flag_Delivery'
        - 'self_checkout'
        - 'Mobile_Checkout'
        - 'Metro'
        - 'Corner'
        - 'Rest_Ops'
        - 'Daylight_Saving_Indicator'
        - 'product_active_flag'
        - 'PERISHABLE'   # FIX: moved here from Features.numerical — Y/N flag
        - 'snap_CA'      # FIX: moved here from Features.numerical — binary 0/1 flag
        - 'snap_TX'
        - 'snap_WI'
    fill_na:
      OPENING_PRES_FIXED: 0
      event_name_1: 'No_Event'
      event_type_1: 'No_Event'
      event_name_2: 'No_Event'
      event_type_2: 'No_Event'
      Holidays: 'No_Holiday'
      promo_amount: 0
      promo_quantity: 0

  drop_columns:
    - 'Item Name'
    - 'ITEM_TREE'
    - 'slc_item_number'
    - 'noi_slin'
    - 'promo_slin'
    - 'selling_upc'
    - 'upc'
    - 'product_id'
    - 'item_description'
    - 'item_id'
    - 'date'
    - 'trans_sales_date_key'
    - 'DAYPART_START'
    - 'DAYPART_END'
    - 'item_dimensions'
    - 'product_hierarchy'
    - 'manufacturer'
    - 'Brand'
    - 'description'
    - 'address'
    - 'Vicinity'
    - 'Geography'
    - 'market_desc'
    - 'Super_Market_Description'
    - 'store_ops_description'
    - 'total_zone_description'
    - 'super_zone_description'
    - 'zone_name'   # dropped here — also removed from categorical_encoding.columns
    - 'ITEM_TYPE'
    - 'transaction_number'
    - 'PRODUCTION_STATUS'
    - 'State'
    - 'PERIOD_STATUS'
    - 'DAYPART_STATUS'
    - 'PRODUCTION_PERIOD_GROUP_STATUS'
    - 'country_code'
    - 'location_number'
    - 'location_id'
    - 'SPW_store_number'
    - 'store_name'
    - 'fiscal_year'
    - 'fiscal_month'
    - 'calendar_week'
    - 'fiscal_week'
    - 'wday'
    - 'month'
    - 'year'
    - 'wm_yr_wk'

  training:
    max_prediction_length: 7
    max_encoder_length: 30
    batch_size: 128
    max_epochs: 50
    learning_rate: 0.001