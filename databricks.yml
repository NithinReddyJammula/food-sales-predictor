bundle:
  name: food-sales-predictor

variables:
  DATABRICKS_CLUSTER_ID:
    description: "The cluster ID to run tasks on"
    default: "0630-020742-js27j99e"
  OTEL_EXPORTER_OTLP_ENDPOINT:
    description: "OpenTelemetry OTLP endpoint"
    default: "https://in-otel.hyperdx.io"
  OTEL_EXPORTER_OTLP_HEADERS:
    description: "OpenTelemetry headers (e.g. authorization=<key>)"
    default: ""

resources:
  jobs:
    data-cleaning_job:
      name: "Data Cleaning"
      tasks:
        - task_key: clean
          spark_python_task:
            python_file: "data-pipeline/Feature_transformation/Data-cleaning.py"
          libraries:
            - pypi:
                package: "PyYAML==6.0.1"
            - pypi:
                package: "opentelemetry-api"
            - pypi:
                package: "opentelemetry-sdk"
            - pypi:
                package: "opentelemetry-exporter-otlp"
          existing_cluster_id: "${var.DATABRICKS_CLUSTER_ID}"
