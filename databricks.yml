bundle:
  name: food-sales-predictor

resources:
  jobs:
    data-cleaning_job:
      name: "Data Cleaning"
      tasks:
        - task_key: clean
          spark_python_task:
            python_file: "data-pipeline/Feature_transformation/Data-cleaning.py"
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "Standard_D3_v2"
            num_workers: 0  # Setting workers to 0 makes it a Single-Node cluster
            spark_conf:
              spark.databricks.cluster.profile: "singleNode"
              spark.master: "local[*]"
            azure_attributes:
              first_on_demand: 1  # 👈 Changed from 0 to 1 to keep the driver on-demand
              availability: "SPOT_WITH_FALLBACK_AZURE"
